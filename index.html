<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div id="overlay" style="position: absolute; z-index: 1000; top:0; left:0; width:100%; height:100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7);">
      <button id="start-btn" style="padding: 20px; background: #FF007A; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
        TAP PARA INICIAR MEMORIA
      </button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <!-- Hemos añadido MUTED para asegurar que cargue -->
        <video id="vid" src="video.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#vid" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const video = document.querySelector("#vid");
      
      startBtn.addEventListener('click', () => {
        document.querySelector("#overlay").style.display = "none";
        video.play(); // Inicia la carga real
      });

      const target = document.querySelector("#target");
      target.addEventListener("targetFound", () => {
        video.muted = false; // Intentamos activar el sonido cuando lo encuentre
        video.play();
      });
      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>

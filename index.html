<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #overlay {
        position: absolute; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9);
      }
      #start-btn {
        padding: 20px 40px; font-size: 20px; background: #FF007A; color: white; border: none; border-radius: 50px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="start-btn">VER VIDEO DE DIEGO</button>
    </div>

    <!-- Ajustamos la escena para que no use luces pesadas -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Importante: He añadido 'muted' y 'autoplay' para forzar la carga inicial -->
        <video id="vid" src="video.mp4" 
               preload="auto" loop="true" 
               crossorigin="anonymous" 
               autoplay="true"
               muted="true"
               playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <!-- Usamos un ancho de 1 y alto de 1.5 por si tu video es vertical -->
        <a-video src="#vid" width="1" height="1.5" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const video = document.querySelector("#vid");

      startBtn.addEventListener('click', () => {
        document.querySelector("#overlay").style.display = "none";
        // Al tocar el botón, activamos el sonido y nos aseguramos que juegue
        video.muted = false;
        video.play();
      });

      const target = document.querySelector("#target");
      target.addEventListener("targetFound", () => {
        console.log("Cartel detectado");
        video.play();
      });
      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>

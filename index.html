<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: absolute; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8);
      }
      #btn {
        padding: 20px 40px; font-size: 18px; background: #FF007A; color: white; 
        border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="btn">VER MEMORIA AUMENTADA</button>
    </div>

    <!-- Video oculto -->
    <video id="web-video" src="video.mp4" preload="auto" loop playsinline webkit-playsinline muted style="display:none;"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="objetivo">
        <!-- AJUSTE DE PROPORCIONES VERTICALES -->
        <!-- width="1" y height="1.77" es la proporción 9:16 (celular vertical) -->
        <a-plane id="pantalla-video" 
                 position="0 0 0" 
                 width="1" 
                 height="1.77" 
                 material="src: #web-video; shader: flat;">
        </a-plane>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector("#btn");
      const video = document.querySelector("#web-video");
      const overlay = document.querySelector("#overlay");

      btn.addEventListener('click', () => {
        overlay.style.display = "none";
        video.play().then(() => {
          video.muted = false;
        }).catch(() => {
          video.muted = true;
          video.play();
        });
      });

      const target = document.querySelector("#objetivo");
      target.addEventListener("targetFound", () => { video.play(); });
      target.addEventListener("targetLost", () => { video.pause(); });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #overlay {
        position: absolute; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8);
      }
      #start-btn {
        padding: 20px 40px; font-size: 20px; background: #FF007A; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="start-btn">INICIAR EXPERIENCIA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Importante: 'playsinline' y 'webkit-playsinline' son para que funcione en iPhone -->
        <video id="vid" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <!-- He cambiado el ancho y alto a 1 para que sea cuadrado por ahora, ajústalo si tu video es rectangular -->
        <a-video src="#vid" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const overlay = document.querySelector("#overlay");
      const video = document.querySelector("#vid");
      const target = document.querySelector("#target");

      startBtn.addEventListener('click', () => {
        overlay.style.display = "none";
        // ESTA PARTE ES CLAVE: Reproduce y pausa el video inmediatamente 
        // para "desbloquear" el permiso de video en el celular.
        video.play().then(() => {
            video.pause();
            console.log("Video desbloqueado");
        }).catch((err) => {
            console.error("Error al desbloquear video:", err);
        });
      });

      target.addEventListener("targetFound", () => {
        console.log("Cartel encontrado");
        video.play();
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
